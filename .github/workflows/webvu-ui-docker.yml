name: Build & Push webvu-ui

on:
  push:
    tags:
      - 'webvu-ui-v*'

permissions:
  id-token: write   # required for OIDC token
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image tags
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#webvu-ui-}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/webvu-ui:latest" >> "$GITHUB_OUTPUT"
          echo "image_versioned=${REGISTRY}/webvu-ui:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./webvu-ui
          push: true
          tags: |
            ${{ steps.meta.outputs.image_versioned }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
