name: API - Build & Push

on:
  push:
    tags:
      - 'api-v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME#api-}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796136114678:role/webvu-github-actions
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/webvu-api:${{ steps.tag.outputs.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" webvu-api/
          docker push "$IMAGE_URI"
