name: Infra - Deploy

on:
  workflow_dispatch:
    inputs:
      apiImageTag:
        description: 'API image tag to deploy (e.g. v1.0.0)'
        required: true
      uiImageTag:
        description: 'UI image tag to deploy (e.g. v1.0.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install infra dependencies
        run: npm ci
        working-directory: webvu-infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy
        run: |
          npx cdk deploy --require-approval never \
            --context apiImageTag=${{ github.event.inputs.apiImageTag }} \
            --context uiImageTag=${{ github.event.inputs.uiImageTag }}
        working-directory: webvu-infra
