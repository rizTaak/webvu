name: Infra - Deploy

on:
  workflow_dispatch:
    inputs:
      apiImageTag:
        description: 'API image tag to deploy (e.g. v1.0.0)'
        required: true
      uiImageTag:
        description: 'UI image tag to deploy (e.g. v1.0.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install infra dependencies
        run: npm ci
        working-directory: webvu-infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796136114678:role/webvu-github-actions
          aws-region: us-east-1

      - name: CDK deploy
        run: |
          npx cdk deploy --require-approval never \
            --context apiImageTag=${{ github.event.inputs.apiImageTag }} \
            --context uiImageTag=${{ github.event.inputs.uiImageTag }}
        working-directory: webvu-infra
