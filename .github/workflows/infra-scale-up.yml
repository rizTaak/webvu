name: Infra - Scale Up

on:
  workflow_dispatch:

jobs:
  scale-up:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::796136114678:role/webvu-github-actions
          aws-region: us-east-1

      - name: Scale ECS services to 1
        run: |
          CLUSTER=$(aws cloudformation describe-stack-resources \
            --stack-name WebvuInfraStack \
            --query 'StackResources[?ResourceType==`AWS::ECS::Cluster`].PhysicalResourceId' \
            --output text)

          echo "Cluster: $CLUSTER"

          for SERVICE in $(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text); do
            echo "Scaling up: $SERVICE"
            aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --desired-count 1
          done

          echo "Done. Allow ~2 minutes for tasks to start and pass health checks."
